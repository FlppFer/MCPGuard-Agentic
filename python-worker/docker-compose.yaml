services:
  python-worker:
    profiles: ["worker"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MCPGUARD_API_URL=http://host.docker.internal:8080
      - MCPGUARD_API_KEY=dev-key
      - MCPGUARD_CLIENT_ID=dev-client
      - STORAGE_MODE=s3
      - S3_ENDPOINT=http://host.docker.internal:4566
      - S3_BUCKET=mcpguard-local-storage
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
      - LLM_API_KEY=${GEMINI_API_KEY:-}
      - LLM_MODEL=gemini-2.5-pro
      - LOG_LEVEL=info
    restart: unless-stopped
